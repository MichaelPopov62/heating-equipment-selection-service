type: object
additionalProperties: true
description: Расчёт теплоотдачи водяного ТП по одной комнате (warmFloorCalc и вспомогательные модули).
properties:
  roomId: { type: string }
  roomName: { type: string }
  roomAreaM2:
    type: number
    description: Полная площадь комнаты из анкеты (теплопотери).
  furnitureOccupiedAreaM2:
    type: number
    description: S_meb — площадь под мебелью без ТП.
  heatedAreaM2:
    type: number
    description: S_акт = roomAreaM2 − furnitureOccupiedAreaM2; SSOT для длины петель ТП и мощности.
  requiredHeatFluxUpWm2:
    type: number
    description: q_треб = roomHeatLossWatts / heatedAreaM2 (Вт/м² на активной зоне).
  requestedPipeSpacingMm:
    type: integer
    enum: [100, 150, 200]
    description: Желаемый шаг из анкеты.
  resolvedPipeSpacingMm:
    type: integer
    enum: [100, 150, 200]
    description: Фактический шаг после авто-подбора (вариант B).
  pipeSpacingResolution:
    $ref: ./UfhPipeSpacingResolution.yaml
  areaM2:
    type: number
    description: Активная площадь ТП (= heatedAreaM2); сохранено для обратной совместимости.
  basePresetId: { type: string }
  finishMaterialId: { type: string }
  ufhCircuitPresetId:
    $ref: ./UfhCircuitPresetId.yaml
  pipeSpacingMm: { type: integer }
  pipeEmbedmentResistanceM2KW: { type: number }
  finishCoveringResistanceM2KW: { type: number }
  circuitSupplyC: { type: number }
  circuitReturnC: { type: number }
  circuitMeanC: { type: number }
  heatFluxUpWm2: { type: number }
  heatFluxDownWm2: { type: number }
  maxAllowableHeatFluxUpWm2: { type: number }
  heatFluxUpWatts: { type: number }
  heatFluxDownWatts: { type: number }
  heatLoadWatts:
    type: number
    description: Нагрузка контура ТП в комнате (= heatFluxUpWatts).
  flowRateM3PerHour: { type: number }
  loopsCount: { type: integer, minimum: 1 }
  pipeResizeApplied:
    type: boolean
    description: true, если применена автооптимизация Ø или числа петель.
  loopHydraulicsResolutionStatus:
    type: string
    enum: [resolved_auto, unresolved_velocity, unresolved_pressure, unresolved_conflict]
  loopHydraulicsAppliedFix:
    type: string
    enum: [none, loops_reduced, loops_increased, pipe_downsized, pipe_upsized]
  loopHydraulicsMinLoopsGeom:
    type: integer
    minimum: 1
  loops:
    type: array
    items:
      $ref: ./UfhLoopSpec.yaml
  roomHeatLossWatts:
    type: number
    description: Теплопотери комнаты из heatLoss.byRoom (для проверки покрытия нагрузки ТП).
  heatFluxCoverageRatio:
    type: number
    description: heatFluxUpWatts / roomHeatLossWatts; < 1 — предупреждение (особенно на 40/30).
  surfaceTempC: { type: number }
  maxSurfaceTemperatureCelsius:
    type: number
    description: Применённый лимит поверхности (min пресета Mongo и паспорта финиша).
  comfortMaxSurfaceTemperatureCelsius: { type: number }
  finishMaxSurfaceTemperatureCelsius:
    type: number
    description: Паспортный лимит финиша до учёта пресета режима ТП.
  presetMaxSurfaceTemperatureCelsius:
    type: number
    description: Лимит из underfloor_heating_presets.technical.maxSurfaceTemperatureC.
  heatFluxUpLimitedBySurface:
    type: boolean
    description: q↑ снижен до maxAllowableHeatFluxUpWm2 из-за лимита температуры поверхности.
  bottomBoundary:
    type: string
    enum: [heated, unheated]
  warnings:
    type: array
    items:
      type: string
