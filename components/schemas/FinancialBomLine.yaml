type: object
description: >
  Строка коммерческой сметы (report.commercial.lines[]): оборудование, монтаж,
  расходники или информационная позиция (например смесительный узел без SKU).
additionalProperties: false
required:
  - id
  - kind
  - objectType
  - equipmentTypeLabel
  - brand
  - model
  - qty
  - qtyUnit
  - unitPriceUah
  - lineTotalUah
  - scopePath
  - categoryId
  - source
properties:
  id:
    type: string
    minLength: 1
    description: Стабильный ключ строки (после схлопывания одинаковых позиций).
  kind:
    type: string
    enum: [equipment, labor, consumable, note]
  objectType:
    type: string
    enum: [house, apartment]
  equipmentTypeLabel:
    type: string
    description: Тип оборудования для UI («Котёл», «Радиатор», «Труба»…).
  brand:
    type: string
    description: Марка; пустая строка, если в каталоге нет brand.
  model:
    type: string
  qty:
    type: number
    minimum: 0
  qtyUnit:
    type: string
    enum: [pcs, m, section, lot]
  unitPriceUah:
    type: number
    nullable: true
    description: Цена за единицу qtyUnit; null — нет цены (note / нет в каталоге).
  lineTotalUah:
    type: number
    nullable: true
    description: Сумма строки; null — не входит в денежные итоги.
  scopePath:
    type: array
    minItems: 1
    items: { type: string }
    description: Иерархия отображения (объект → зона / этаж / помещение).
  categoryId:
    type: string
    enum: [boiler_room, radiators, ufh, hydraulics_heating, works]
  catalogId:
    type: string
    description: Идентификатор позиции каталога (pipe id, pump id, unibox id…).
  source:
    type: string
    description: Источник в отчёте (matching.boiler, hydraulics.pipes…).
  note:
    type: string
    description: Пояснение для клиента (например «сборка самостоятельно»).
