type: object
additionalProperties: true
description: >
  Блок calculations.hotWater — расчёт ГВС. Числовые нормы (л/с на точку, сеансовые объёмы, β, пороги бака)
  задаются справочником water_norms; в отчёте фиксируется normsSchemaVersion.
properties:
  objectType:
    type: string
    enum: [house, apartment]
  residents:
    type: integer
    minimum: 0
  fixtures:
    type: object
    additionalProperties: true
  tropicalShower:
    type: boolean
    description: >
      Усиленный («тропический») душ: в отчёте отражает входной флаг; на объём бака
      влияет через tropicalShowerVolumeFactor (дом — storage; квартира/буферные схемы ЭВН —
      нормы apartmentElectricStorage / combiBuffer / singleCircuitBuffer).
  coldWaterDesignSeason:
    type: string
    enum: [winter, summer]
  dhwSupplyScenario:
    type: string
    enum: [flowThrough, storage]
    description: >
      Базовый сценарий по типу объекта (квартира — flowThrough, дом — storage);
      может быть переопределён схемой котла/ГВС (например storage для квартиры + ЭВН/БКН).
  designColdWaterC:
    type: number
    description: Фактическая расчётная температура ХВ (+5 зима / +15 лето из water_norms).
  hotWaterC:
    type: number
  deltaTK:
    type: number
  sumFlowLpsRaw:
    type: number
  simultaneityFactor:
    type: number
  peakFlowLps:
    type: number
  peakThermalPowerKw:
    type: number
  hotWaterPowerKw:
    type: number
  recommendedTankLiters:
    type: integer
    description: >
      Рекомендуемый объём накопителя/буфера после норм и (при флаге) × tropicalShowerVolumeFactor;
      для чистого flowThrough без бака — 0.
  normsSchemaVersion:
    type: integer
    minimum: 1
    description: Версия справочника water_norms, применённая в этом расчёте.
  simultaneityBaseNorm:
    type: number
  storageTankLitersPerPersonBasis:
    type: number
  storageHeatTimeMinutes:
    type: number
  storageIndirectHeatPowerKw:
    type: number
  sessionDemandLitersMixed:
    type: number
  dhwEquivalentTankLitersFromSession:
    type: number
  dhwTankLitersCombinedRaw:
    type: number
