type: object
description: >-
  Підбір радіаторів під лінію «Економ» або «Ефективний» (report.matching.radiators.lineEconomy /
  lineEfficient). Узгоджено з proposalEconomy / proposalEfficient котла: фіксований пресет графіка
  (traditional_dt50_75_65 або condensing_dt30_55_45).
required:
  - tier
  - boilerModel
  - chosen
  - byRoom
  - warnings
  - totalSections
  - emittersSummary
properties:
  tier:
    type: string
    enum: [economy, efficient]
  boilerModel:
    type: string
    nullable: true
    description: Модель котла з відповідної proposal*-лінії.
  chosen:
    type: object
    nullable: true
    allOf:
      - $ref: RadiatorsChosenSummary.yaml
  byRoom:
    type: array
    items:
      $ref: RadiatorsByRoomItem.yaml
  warnings:
    type: array
    items: { type: string }
  totalSections:
    type: integer
    nullable: true
    description: >-
      Сума секцій лише по секційних кімнатах (= emittersSummary.sectionalSections);
      панелі не входять. null — лінія недоступна / немає секційних даних.
  emittersSummary:
    $ref: RadiatorsEmittersSummary.yaml
  unavailableReason:
    type: string
    description: >-
      Якщо proposalEconomy / proposalEfficient відсутня в каталозі — текст, чому лінія недоступна
      (UI показує замість таблиці).
  inputs:
    type: object
    description: Параметри розрахунку для цієї лінії.
    properties:
      supplyC: { type: number }
      returnC: { type: number }
      insideC: { type: number }
      baseDeltaT:
        type: integer
        enum: [50, 70]
      targetDeltaT: { type: number }
      ventilationReserveFactor:
        type: number
        description: Множитель kVent (1.3 natural / 1.1 recuperation).
      radiatorSizingAlignedWithCondensing: { type: boolean }
      heatingDistribution:
        type: string
        enum: [individual, central]
      radiatorConnection:
        type: string
        enum: [side, bottom]
      radiatorEmitterPreference:
        type: string
        enum: [auto, sectional, panel]
      thermalRegimePreset:
        type: string
        description: Застосований пресет графіка (traditional_dt50_75_65 / condensing_dt30_55_45).
  radiatorSelectionNotes:
    type: array
    items: { type: string }
    description: Пояснення щодо сімейства радіаторів, панельних моделей, конденсаційного графіка.
  resolvedEmitterKind:
    type: string
    nullable: true
    enum: [sectional, panel]
  emitterKindVotes:
    type: object
    properties:
      sectional: { type: integer, minimum: 0 }
      panel: { type: integer, minimum: 0 }
  emitterKindDecisionNotes:
    type: array
    items: { type: string }
