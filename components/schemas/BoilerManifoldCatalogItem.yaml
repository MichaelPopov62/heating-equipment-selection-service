type: object
description: >
  Котельный распределительный коллектор после validateCatalog.
additionalProperties: true
required:
  - model
  - brand
  - article
  - price
  - circuitsCount
  - maxPowerKw
  - hasInsulation
  - interaxleDistanceMm
  - connectionBoilerInch
  - connectionCircuitsInch
  - maxPressureBar
  - maxTemperatureC
  - material
  - dimensions
properties:
  model:
    type: string
  brand:
    type: string
  article:
    type: string
  price:
    type: number
    minimum: 1
  circuitsCount:
    type: integer
    minimum: 1
    maximum: 32
  maxPowerKw:
    type: number
    minimum: 0.1
    maximum: 500
  hasInsulation:
    type: boolean
  interaxleDistanceMm:
    type: number
    minimum: 50
    maximum: 300
  connectionBoilerInch:
    type: string
  connectionCircuitsInch:
    type: string
  maxPressureBar:
    type: number
    minimum: 0.1
    maximum: 25
  maxTemperatureC:
    type: number
    minimum: 30
    maximum: 120
  material:
    type: string
  dimensions:
    type: object
    additionalProperties: false
    required: [width, height, depth]
    properties:
      width:
        type: number
        minimum: 100
        maximum: 3000
      height:
        type: number
        minimum: 50
        maximum: 1000
      depth:
        type: number
        minimum: 20
        maximum: 500
