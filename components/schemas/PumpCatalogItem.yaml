type: object
description: >
  Циркуляционный насос в каталоге после validateCatalog. Кривая напора H(Q) задаётся
  коэффициентами a, b, c в operatingModes (H = a·Q² + b·Q + c, Q в м³/ч, H в м).
  При validateCatalog qMax подрезается по кривой (см. docs/hydraulics-pipeline.md § «Кривая насоса в каталоге»).
additionalProperties: true
required:
  - model
  - id
  - brand
  - type
  - segment
  - price
  - connections
  - operatingModes
properties:
  model:
    type: string
  id:
    type: string
    description: Уникальный идентификатор строки каталога (в Mongo дублируется в pumpId при seed).
  brand:
    type: string
  series:
    type: string
  segment:
    type: string
    enum: [premium, medium, budget]
  country:
    type: string
  type:
    type: string
    enum: [electronic, three_speed, circulation_hot_water]
    description: Тип насоса (электронный, трёхскоростной, рециркуляция ГВС).
  price:
    type: number
    minimum: 1
    description: Ориентировочная цена (валюта — currency каталога, обычно UAH).
  connections:
    type: object
    required: [mountingLengthMm, threadInch, nominalDiameterMm]
    properties:
      mountingLengthMm:
        type: number
        minimum: 1
      threadInch:
        type: string
      nominalDiameterMm:
        type: number
        minimum: 1
  operatingModes:
    type: array
    minItems: 1
    items:
      type: object
      required: [modeName, speedIndex, powerWatts, coefficients, qMinM3h, qMaxM3h]
      properties:
        modeName:
          type: string
        speedIndex:
          type: integer
          minimum: 1
          maximum: 9
        powerWatts:
          type: number
          minimum: 0
        coefficients:
          type: object
          required: [a, b, c]
          properties:
            a:
              type: number
            b:
              type: number
            c:
              type: number
        qMinM3h:
          type: number
          minimum: 0
        qMaxM3h:
          type: number
          minimum: 0
          description: >
            Верхняя граница расхода режима (м³/ч). После validateCatalog может быть уменьшен,
            если H(qMax) по полиному ниже pumpMinHeadAtQMaxM из appliances.hydraulics.
