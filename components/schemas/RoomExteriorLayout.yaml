type: string
enum: [corner, facade, internal]
description: >
  Положение помещения относительно наружного контура.
  corner — угловое (две фасадные стены, множитель угловой комнаты на wall/window);
  facade — одна фасадная стена (только β по ориентации);
  internal — без фасада, стена в неотапливаемый коридор (ΔT к расчётной температуре коридора ~15 °C).
