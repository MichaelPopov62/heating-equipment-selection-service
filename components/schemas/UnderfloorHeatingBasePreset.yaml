type: object
additionalProperties: false
required:
  - id
  - name
  - usage
  - baseCoveringResistanceM2KW
  - layers
properties:
  id: { type: string, minLength: 1 }
  name: { type: string, minLength: 1 }
  description: { type: string }
  usage:
    type: string
    enum: [underfloor_heating_base]
  bottomBoundary:
    type: string
    enum: [heated, unheated]
  baseCoveringResistanceM2KW:
    type: number
    minimum: 0
  layers:
    type: array
    minItems: 1
    items:
      $ref: UnderfloorHeatingAssemblyLayer.yaml
