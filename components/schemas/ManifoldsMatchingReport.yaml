type: object
description: >
  Подбор коллекторов из каталога (report.matching.manifolds) для сметы.
  Выполняется после резолва underfloorHeating.distributionPreset, до гидравлического pipeline.
  ТП: при >12 петель на этаж — каскад units[] (равномерный split).
  Soft-fail: ok=false → underfloor=[], radiator/boilerManifold=null; расчёт унибоксов и гидравлики продолжается.
  Штатный дефицит SKU (selected=null) — это ok=true, не soft-fail.
additionalProperties: false
required:
  - ok
  - underfloor
  - radiator
  - boilerManifold
  - warnings
properties:
  ok:
    type: boolean
    description: >
      true — подбор выполнен штатно (в т.ч. при selected=null по позициям).
      false — критический сбой: underfloor пустой, radiator и boilerManifold = null.
  failureCode:
    type: string
    enum: [MANIFOLD_INTERNAL, MANIFOLD_INPUT_INVALID]
    description: Машинный код сбоя; только при ok=false.
  underfloor:
    type: array
    description: >
      Коллекторы ТП — по одному элементу на этаж; внутри units[] (1 или каскад).
      При ok=false — всегда []. Пустой массив валиден; minItems:1 у units относится
      только к элементам, реально попавшим в underfloor.
    items:
      type: object
      additionalProperties: false
      required: [floor, requiredOutlets, units, warnings]
      properties:
        floor:
          type: integer
          minimum: 1
        requiredOutlets:
          type: integer
          minimum: 0
          description: Сумма петель этажа.
        units:
          type: array
          minItems: 1
          items:
            type: object
            additionalProperties: false
            required: [index, requiredOutlets, selected, warnings]
            properties:
              index:
                type: integer
                minimum: 1
                description: 1-based индекс в каскаде.
              requiredOutlets:
                type: integer
                minimum: 1
              selected:
                type: object
                nullable: true
                allOf:
                  - $ref: ManifoldCatalogItem.yaml
              warnings:
                type: array
                items: { type: string }
        warnings:
          type: array
          items: { type: string }
  radiator:
    nullable: true
    description: Радиаторный коллектор — только при hydraulics.radiatorWiringSystemType=manifold.
    type: object
    additionalProperties: false
    required: [requiredOutlets, selected, warnings]
    properties:
      requiredOutlets:
        type: integer
        minimum: 0
      selected:
        type: object
        nullable: true
        allOf:
          - $ref: ManifoldCatalogItem.yaml
      warnings:
        type: array
        items: { type: string }
  boilerManifold:
    nullable: true
    description: >
      Котельный распределительный коллектор. Для квартиры не подбирается.
      Для дома — при hydraulic_separator или при двух зонах (радиаторы + ТП).
    type: object
    additionalProperties: false
    required: [requiredCircuits, requiredPowerKw, selected, warnings]
    properties:
      requiredCircuits:
        type: integer
        minimum: 1
      requiredPowerKw:
        type: number
        minimum: 0
      selected:
        type: object
        nullable: true
        allOf:
          - $ref: BoilerManifoldCatalogItem.yaml
      warnings:
        type: array
        items: { type: string }
  warnings:
    type: array
    items: { type: string }
