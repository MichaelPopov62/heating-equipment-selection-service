type: object
description: Підбір радіатора по одному приміщенню (report.matching.radiators.byRoom[]).
required:
  - roomId
  - roomName
  - heatLossWatts
  - radiatorDesignWatts
  - radiatorModel
  - outputPerSectionWatts
  - sections
properties:
  roomId: { type: string }
  roomName: { type: string }
  heatLossWatts:
    type: number
    description: Тепловтрати контуру приміщення без запасу на інфільтрацію, Вт.
  radiatorDesignWatts:
    type: number
    description: >
      Нагрузка на подбор радиатора, Вт: designWatts комнаты (envelopeWatts × kVent);
      в смешанном режиме с ТП — остаток после вычета heatFluxUpWatts (0, если ТП покрывает нагрузку).
  flowRateM3PerHour:
    type: number
    minimum: 0
    description: Расход теплоносителя по комнате, м³/ч (thermalLoadToFlow с flowDeltaTK).
  radiatorModel: { type: string }
  outputPerSectionWatts:
    type: number
    description: >-
      Перерахована потужність однієї секції під фактичний графік, Вт.
      Для priceBasis=panel завжди 0 (потужність панелі — у deliverableWatts).
  sections:
    type: integer
    nullable: true
    description: >-
      Число секцій; null якщо priceBasis=panel або прилад не підібрано.
  unitsCount:
    type: integer
    minimum: 1
    description: Кількість приладів у кімнаті (≥1; ескалація multi-unit при lock типу).
  deliverableWatts:
    type: number
    minimum: 0
    description: >-
      Фактична віддача підібраного приладу, Вт: секції — sections×outputPerSectionWatts;
      панель — adjustedWatts панелі цілком.
  displayKind:
    type: string
    enum: [sectional, panel, none]
    description: Стабільний тип для UI / смети / порівняння ліній.
  sectionsThermalMin:
    type: integer
    nullable: true
    description: Мінімум секцій лише за тепловою навантаженням (до правила ширини вікна).
  windowOpeningWidthMm:
    type: number
    nullable: true
    description: Максимальна ширина вікна в приміщенні з анкети (openingWidthMm), мм.
  radiatorWidthMm:
    type: number
    nullable: true
    description: Розрахункова ширина приладу (sections × sectionWidthMm), мм.
  widthCoverageRatio:
    type: number
    nullable: true
    description: Відношення radiatorWidthMm / windowOpeningWidthMm.
  widthOk:
    type: boolean
    nullable: true
    description: true, якщо widthCoverageRatio ≥ 0.7.
  warnings:
    type: array
    items: { type: string }
    description: Попередження по приміщенню (наприклад, <70 % ширини вікна).
  sizingNotes:
    type: array
    items: { type: string }
    description: Пояснення коригування числа секцій (правило вікна, досбор).
  priceBasis:
    type: string
    enum: [section, panel]
    description: Базис ціни / типу приладу з каталогу.
  unitPriceUah:
    type: number
    nullable: true
    minimum: 0
    description: >
      Ціна з каталогу (UAH): за секцію (priceBasis=section) або за панель цілком
      (priceBasis=panel). Для комерційної смети report.commercial.
  panelLengthMm:
    type: number
    nullable: true
    description: Довжина панелі, мм (лише priceBasis=panel).
