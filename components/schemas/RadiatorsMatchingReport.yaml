type: object
description: >-
  Результат підбору радіаторів (report.matching.radiators). Основна лінія — графік з анкети;
  lineEconomy / lineEfficient — секції під картки proposalEconomy / proposalEfficient котла
  (pickRadiatorsWithProposalLines у matching/radiators.js).
required:
  - chosen
  - byRoom
  - warnings
  - emittersSummary
properties:
  chosen:
    type: object
    nullable: true
    allOf:
      - $ref: RadiatorsChosenSummary.yaml
  byRoom:
    type: array
    items:
      $ref: RadiatorsByRoomItem.yaml
  warnings:
    type: array
    items: { type: string }
  emittersSummary:
    $ref: RadiatorsEmittersSummary.yaml
    description: Агрегат основної лінії підбору (графік з анкети).
  totalSections:
    type: integer
    nullable: true
    description: >-
      Alias emittersSummary.sectionalSections (без панелей). Зручність для legacy UI.
  roomEmitterDiffs:
    type: array
    items:
      $ref: RadiatorsRoomEmitterDiff.yaml
    description: >-
      Порівняння приладів по кімнатах між lineEconomy і lineEfficient
      (equipmentKindChanged тощо).
  lineEconomy:
    $ref: RadiatorsProposalLineReport.yaml
    description: >-
      Лінія «Економ» (графік 75/65 °C). Завжди повертається pickRadiatorsWithProposalLines:
      підбір під proposalEconomy або unavailableReason.
  lineEfficient:
    $ref: RadiatorsProposalLineReport.yaml
    description: >-
      Лінія «Ефективний» (графік 55/45 °C). Завжди повертається pickRadiatorsWithProposalLines:
      підбір під proposalEfficient або unavailableReason.
  inputs:
    type: object
    description: Параметри основної лінії підбору.
    properties:
      supplyC: { type: number }
      returnC: { type: number }
      insideC: { type: number }
      baseDeltaT:
        type: integer
        enum: [50, 70]
      targetDeltaT: { type: number }
      flowDeltaTK:
        type: number
        description: ΔT для расчёта flowRateM3PerHour по комнатам.
      deltaTSystemK:
        type: number
        description: Значение из анкеты hydraulics.deltaTSystemK (если задано).
      ventilationReserveFactor:
        type: number
        description: Множитель kVent (1.3 natural / 1.1 recuperation) — запас вентиляции по комнатам.
      radiatorSizingAlignedWithCondensing: { type: boolean }
      heatingDistribution:
        type: string
        enum: [individual, central]
      radiatorConnection:
        type: string
        enum: [side, bottom]
      radiatorEmitterPreference:
        type: string
        enum: [auto, sectional, panel]
      thermalRegimePreset: { type: string }
  radiatorSelectionNotes:
    type: array
    items: { type: string }
  resolvedEmitterKind:
    type: string
    nullable: true
    enum: [sectional, panel]
    description: Єдиний тип приладів на об'єкт після Two-Pass Orchestrator.
  emitterKindVotes:
    type: object
    properties:
      sectional: { type: integer, minimum: 0 }
      panel: { type: integer, minimum: 0 }
  emitterKindDecisionNotes:
    type: array
    items: { type: string }
  skippedReason:
    type: string
    nullable: true
    enum: [ufh_only]
    description: >-
      Підбір радіаторів не виконувався (режим «тільки ТП»). byRoom порожній;
      цифри секцій / emittersSummary не є результатом matching — UI не повинен
      підставляти чернеткову оцінку секцій.
