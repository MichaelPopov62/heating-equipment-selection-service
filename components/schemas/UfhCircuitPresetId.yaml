type: string
description: >
  Идентификатор температурного пресета контура водяного тёплого пола (отдельно от радиаторного
  heatingSystem.thermalRegimePreset). Выбирается по finishMaterialId комнаты, не вручную в анкете.
  Оба пресета имеют Δt = 10 K для расчёта расхода теплоносителя.
enum:
  - ufh_dt10_45_35
  - ufh_dt10_40_30
# ufh_dt10_45_35 — 45/35 °C (плитка, керамогранит)
# ufh_dt10_40_30 — 40/30 °C (ламинат, LVT/SPC, линолеум для ТП)
