type: object
description: Подбор труб и насоса по результатам гидравлики (диаметры только здесь).
additionalProperties: false
required: [pipes, warnings]
properties:
  pipes:
    type: array
    items:
      type: object
      additionalProperties: false
      required: [edgeId, catalogPipeId, velocityMps, pressureDropKPa, internalDiameterMm]
      properties:
        edgeId: { type: string }
        catalogPipeId: { type: string }
        velocityMps: { type: number }
        pressureDropKPa: { type: number }
        internalDiameterMm: { type: number }
        velocityLimitExceeded:
          type: boolean
          description: true — ни одна труба каталога не уложилась в vMax; подобран max Ø с превышением скорости.
        velocityBelowMin:
          type: boolean
          description: Скорость ниже минимума; на транзите котла Ø выбран по guard Dвн, не по vMin.
        mainTransitGuardApplied:
          type: boolean
          description: true — применён guard Dвн ≥ mainTransitMinInternalDiameterMm.
        catalogPoolExhausted:
          type: boolean
          description: true — в каталоге нет трубы с требуемым Dвн.
  topology:
    type: string
    enum: [direct, mixing_valve, hydraulic_separator]
  circulationZones:
    type: array
    items:
      $ref: HydraulicsCirculationZone.yaml
  pump:
    $ref: HydraulicsPumpMatchItem.yaml
  pumps:
    type: array
    items:
      $ref: HydraulicsPumpMatchItem.yaml
  proposal:
    $ref: HydraulicsProposalReport.yaml
  warnings:
    type: array
    items: { type: string }
