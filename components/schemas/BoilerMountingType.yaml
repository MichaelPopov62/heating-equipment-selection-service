type: string
enum: [wall, floor]
description: >-
  Способ установки котла в каталоге: wall — настенный, floor — напольный.
  При загрузке каталога допускаются синонимы (wall-mounted, floor-standing, настенный, напольный)
  и вывод из тегов; в API и после нормализации остаются только wall или floor.
