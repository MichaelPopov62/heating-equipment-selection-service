type: object
additionalProperties: false
required:
  - id
  - name
  - usage
  - mountType
  - finishTypes
  - constraints
  - coveringResistanceM2KW
  - layers
properties:
  id: { type: string, minLength: 1 }
  name: { type: string, minLength: 1 }
  description: { type: string }
  usage:
    type: string
    enum: [underfloor_heating_system]
  bottomBoundary:
    type: string
    enum: [heated, unheated]
    description: Типичная нижняя граница применения пресета
  mountType:
    type: string
    enum: [glued, floating]
  finishTypes:
    type: array
    minItems: 1
    items:
      type: string
      enum: [pvc_tile, quartz_vinyl]
  constraints:
    $ref: UnderfloorHeatingAssemblyConstraints.yaml
  coveringResistanceM2KW:
    type: number
    minimum: 0
    description: Предвычисленное Rλ,B слоёв над isHeatingLayer
  layers:
    type: array
    minItems: 1
    items:
      $ref: UnderfloorHeatingAssemblyLayer.yaml
